<!DOCTYPE html>
<html>
<head>
  <title>Scattergories Game</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 750px; margin: 40px auto; padding: 0 20px; }
    h1 { text-align: center; font-size: 2.2em; }
    #questions p { font-size: 1.4em; margin: 8px 0; }
    #memes { margin-top: 20px; }
    #memes .meme-item { margin-bottom: 28px; display: flex; flex-direction: column; align-items: flex-start; }
    #memes .meme-item p.meme-num { font-size: 1.4em; font-weight: bold; margin: 0 0 6px 0; }
    #memes img { width: 340px; border-radius: 10px; display: block; }
    #memes p.meme-title { font-size: 1em; color: #555; margin: 6px 0 0 0; }
    .fallback-q { font-size: 1.4em; color: #666; font-style: italic; margin: 4px 0; }
    .buttons { display: flex; gap: 12px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
    button { padding: 12px 28px; font-size: 1.1em; cursor: pointer; border-radius: 6px; border: 1px solid #ccc; background: #f5f5f5; }
    button:hover { background: #e0e0e0; }
    #share-box { margin: 16px auto; max-width: 650px; display: none; }
    #share-box input { width: 100%; padding: 10px; font-size: 1em; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; }
    #copy-msg { text-align: center; color: green; font-size: 1em; min-height: 1.4em; margin-top: 6px; }
    .error { color: red; font-size: 1.2em; }
  </style>
</head>
<body>
  <h1>🎲 Scattergories meme version</h1>
  <div class="buttons">
    <button onclick="newRound()">🔀 New Round</button>
    <button onclick="shareRound()">🔗 Share This Round</button>
  </div>
  <div id="share-box">
    <input id="share-url" type="text" readonly onclick="this.select()" />
    <p id="copy-msg"></p>
  </div>
  <div id="questions"></div>
  <div id="memes"></div>

  <script>
    let allQuestions = [];
    let currentQuestions = [];
    let currentMemeUrls = [];

    fetch('questions.txt')
      .then(r => {
        if (!r.ok) throw new Error('Could not load questions.txt');
        return r.text();
      })
      .then(txt => {
        allQuestions = txt.split('\n').map(q => q.trim()).filter(q => q.length > 0);
        const params = new URLSearchParams(window.location.search);
        const encoded = params.get('round');
        if (encoded) {
          loadFromUrl(encoded);
        } else {
          newRound();
        }
      })
      .catch(err => {
        document.getElementById('questions').innerHTML =
          `<p class="error">Error loading questions: ${err.message}</p>`;
      });

    function newRound() {
      currentMemeUrls = [];
      const shuffled = [...allQuestions].sort(() => Math.random() - 0.5);
      currentQuestions = shuffled.slice(0, 9);
      renderQuestions(currentQuestions);
      document.getElementById('share-box').style.display = 'none';
      document.getElementById('copy-msg').textContent = '';
      loadMemes();
    }

    function renderQuestions(questions) {
      document.getElementById('questions').innerHTML =
        questions.map((q, i) => `<p>${i + 1}. ${q}</p>`).join('');
    }

    function loadMemes() {
      const container = document.getElementById('memes');
      container.innerHTML = '<p style="color:#aaa;text-align:center;font-size:1.2em">Loading memes...</p>';

      const seen = new Set();
      const results = [];

      function fetchOne(remaining) {
        if (remaining === 0 || results.length === 3) {
          renderMemes(results);
          return;
        }
        fetch('https://meme-api.com/gimme')
          .then(r => r.json())
          .then(m => {
            if (m.url && !seen.has(m.url)) {
              seen.add(m.url);
              results.push({ url: m.url, title: m.title });
            }
            fetchOne(remaining - 1);
          })
          .catch(() => fetchOne(remaining - 1));
      }

      fetchOne(6);
    }

    function renderMemes(memes) {
      currentMemeUrls = memes.map(m => m.url);
      const container = document.getElementById('memes');
      container.innerHTML = '';

      const total = 3;
      let memeIndex = 0;

      for (let i = 0; i < total; i++) {
        const num = 10 + i;
        const div = document.createElement('div');
        div.className = 'meme-item';

        if (memeIndex < memes.length) {
          const m = memes[memeIndex++];
          div.innerHTML = `
            <p class="meme-num">${num}. </p>
            <img src="${m.url}" onerror="replaceMemeWithQuestion(this, ${num})">
            <p class="meme-title">${m.title}</p>`;
        } else {
          div.innerHTML = fallbackQuestionHTML(num);
        }

        container.appendChild(div);
      }
    }

    function replaceMemeWithQuestion(img, num) {
      const used = new Set(currentQuestions);
      const extras = allQuestions.filter(q => !used.has(q));
      const q = extras[Math.floor(Math.random() * extras.length)] || '(No extra question available)';
      img.parentElement.innerHTML = `<p class="meme-num">${num}.</p><p class="fallback-q">${q}</p>`;
    }

    function fallbackQuestionHTML(num) {
      const used = new Set(currentQuestions);
      const extras = allQuestions.filter(q => !used.has(q));
      const q = extras[Math.floor(Math.random() * extras.length)] || '(No extra question available)';
      return `<p class="meme-num">${num}.</p><p class="fallback-q">🎯 ${q}</p>`;
    }

    function shareRound() {
      const data = { q: currentQuestions, m: currentMemeUrls };
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
      const url = `${location.origin}${location.pathname}?round=${encoded}`;
      const box = document.getElementById('share-box');
      box.style.display = 'block';
      document.getElementById('share-url').value = url;
      navigator.clipboard.writeText(url).then(() => {
        document.getElementById('copy-msg').textContent = '✅ Link copied to clipboard!';
      }).catch(() => {
        document.getElementById('copy-msg').textContent = 'Copy the link above to share.';
      });
    }

    function loadFromUrl(encoded) {
      try {
        const data = JSON.parse(decodeURIComponent(escape(atob(encoded))));
        currentQuestions = data.q || [];
        currentMemeUrls = data.m || [];
        renderQuestions(currentQuestions);
        renderSharedMemes(currentMemeUrls);
      } catch (e) {
        newRound();
      }
    }

    function renderSharedMemes(urls) {
      const container = document.getElementById('memes');
      container.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const num = 10 + i;
        const div = document.createElement('div');
        div.className = 'meme-item';
        if (urls[i]) {
          div.innerHTML = `
            <p class="meme-num">${num}.</p>
            <img src="${urls[i]}" onerror="replaceMemeWithQuestion(this, ${num})">`;
        } else {
          div.innerHTML = fallbackQuestionHTML(num);
        }
        container.appendChild(div);
      }
    }
  </script>
</body>
</html>
